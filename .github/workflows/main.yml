name: Build Windows Qt App
on: [push]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.5.0'
        host: 'windows'
        target: 'desktop'
        arch: 'win64_mingw'

    - name: Compile Project
      run: |
        qmake "CONFIG+=release"
        mingw32-make

    - name: Pack Dependencies (DLLs)
      shell: bash
      run: |
        windeployqt --no-translations release/*.exe

    - name: Upload Artifact for Vanesy
      uses: actions/upload-artifact@v4
      with:
        name: Beneficios_Vanesy
        path: release/
